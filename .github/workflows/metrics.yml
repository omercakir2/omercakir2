name: Metrics
on:
  # Her gün gece yarısı (UTC) güncelle
  schedule: [{ cron: "0 0 * * *" }]
  # Elle de çalıştırabilmek için
  workflow_dispatch:
  # main'e her push'ta güncelle
  push: { branches: ["main"] }

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # METRICS_TOKEN secret'ı olarak eklediğin Personal Access Token
          token: ${{ secrets.METRICS_TOKEN }}
          user: omercakir2
          filename: github-metrics.svg

          # Görünüm
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Istanbul
          config_animations: yes

          # Diller
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # Isometrik katkı takvimi (örnekteki 3D takvim)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Kodlama alışkanlıkları (saatlik/günlük aktivite)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_charts: yes

          # Aktivite akışı
          plugin_activity: yes
          plugin_activity_limit: 5

          # Kullanılan teknolojiler/araçlar
          plugin_topics: yes
          plugin_topics_mode: icons
